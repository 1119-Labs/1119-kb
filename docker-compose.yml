# =============================================================================
# Knowledge Agent Template - Docker Compose (dedicated server, no Vercel)
# =============================================================================
# Usage:
#   1. Copy apps/app/.env.example to apps/app/.env and set required variables.
#   2. Put local overrides/secrets in apps/app/.env.local (loaded after .env).
#      Optional for non-interactive token refresh in Docker:
#      - AUTO_PULL_VERCEL_OIDC_TOKEN=1
#      - VERCEL_TOKEN=...
#      - VERCEL_TEAM_ID=...
#   3. For build args (${VAR}), Compose substitutes from your shell (or .env next
#      to this file). Export BETTER_AUTH_SECRET and POSTGRES_PASSWORD before build.
#   4. docker compose build && docker compose up -d
#
# Note: env_file entries are loaded only when the container RUNS, not during
# image build.
# =============================================================================

services:
  app:
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    image: 1119labs/kb:latest
    container_name: kb-app
    ports:
      - 9006:3000
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      # Force Postgres (Nuxt Hub checks POSTGRES_URL first; without it falls back to PGLite and fails in Docker)
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kb
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kb
    env_file:
      - apps/app/.env
    volumes:
      # Persist local blob storage (file uploads) when not using Vercel Blob
      - ../app_data:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: 300m

  postgres:
    image: postgres:16-alpine
    container_name: kb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kb
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Redis for bot state (GitHub/Discord) so state survives restarts.
  # Start with: docker compose --profile with-redis up -d
  # Then set in .env: REDIS_URL=redis://redis:6379
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    #ports:
    #  - "6379:6379"
    volumes:
      - ../redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

