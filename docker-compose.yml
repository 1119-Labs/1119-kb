# =============================================================================
# Knowledge Agent Template - Docker Compose (dedicated server, no Vercel)
# =============================================================================
# Usage:
#   1. Copy apps/app/.env.example to apps/app/.env and set required variables.
#   2. Ensure DATABASE_URL in .env points to postgres service (see below).
#   3. For build, Compose only substitutes ${VAR} from a .env in this directory
#      or your shell. So either put BETTER_AUTH_SECRET and POSTGRES_PASSWORD in
#      a .env here, or run: export $(grep -v '^#' apps/app/.env | xargs)
#   4. docker compose build && docker compose up -d
#
# Note: env_file (apps/app/.env) is loaded only when the container RUNS, not
# during image build. Build args and ${VAR} in this file come from the host
# environment or from a .env file in this directory (next to docker-compose.yml).
# =============================================================================

services:
  app:
    build:
      context: .
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    image: 1119labs/kb:latest
    container_name: kb-app
    ports:
      - 9006:3000
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Override DATABASE_URL to use the postgres service (default for compose)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/kb
      VERCEL_OIDC_TOKEN: ${VERCEL_OIDC_TOKEN}
    env_file:
      - apps/app/.env
    volumes:
      # Persist local blob storage (file uploads) when not using Vercel Blob
      - ../app_data:/app/.data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: 300m

  postgres:
    image: postgres:16-alpine
    container_name: kb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kb
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb -d kb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Redis for bot state (GitHub/Discord) so state survives restarts.
  # Start with: docker compose --profile with-redis up -d
  # Then set in .env: REDIS_URL=redis://redis:6379
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    #ports:
    #  - "6379:6379"
    volumes:
      - ../redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

